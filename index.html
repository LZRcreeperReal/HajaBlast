<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chip & Draw</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- LOBBY SCREEN -->
  <div id="screen-lobby" class="screen active">
    <div class="lobby-felt">
      <div class="lobby-center">
        <div class="game-logo">
          <span class="logo-suit">♠</span>
          <h1>Chip &amp; Draw</h1>
          <span class="logo-suit">♦</span>
        </div>
        <p class="lobby-sub">A four-player card &amp; dice game of push and pull</p>
        <div class="lobby-config">
          <label for="num-ai">Number of AI opponents</label>
          <div class="stepper">
            <button id="ai-minus" class="step-btn">−</button>
            <span id="ai-count">3</span>
            <button id="ai-plus" class="step-btn">+</button>
          </div>
          <p class="stepper-hint">You + <span id="ai-label">3 AI</span> = <span id="total-label">4 players</span></p>
        </div>
        <button id="btn-start" class="btn-primary">Deal Me In</button>
      </div>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div id="screen-game" class="screen">

    <!-- TABLE -->
    <div id="poker-table">

      <!-- AI PLAYERS (top / left / right) -->
      <div id="ai-top" class="player-zone ai-zone" data-seat="1"></div>
      <div id="ai-left" class="player-zone ai-zone" data-seat="2"></div>
      <div id="ai-right" class="player-zone ai-zone" data-seat="3"></div>

      <!-- TABLE CENTER -->
      <div id="table-center">
        <div id="pot-area">
          <div id="pot-chips-visual"></div>
          <div id="pot-label">POT <span id="pot-amount">0</span> chips</div>
        </div>
        <div id="dice-area">
          <div id="dice-wrapper">
            <div id="dice" class="dice">
              <div class="face front"><span class="pip center"></span></div>
              <div class="face back">
                <span class="pip top-left"></span><span class="pip top-right"></span>
                <span class="pip bottom-left"></span><span class="pip bottom-right"></span>
                <span class="pip mid-left"></span><span class="pip mid-right"></span>
              </div>
              <div class="face right">
                <span class="pip top-left"></span><span class="pip top-right"></span>
                <span class="pip bottom-left"></span><span class="pip bottom-right"></span>
              </div>
              <div class="face left">
                <span class="pip top-left"></span><span class="pip center"></span>
                <span class="pip bottom-right"></span>
              </div>
              <div class="face top">
                <span class="pip top-left"></span><span class="pip top-right"></span>
              </div>
              <div class="face bottom">
                <span class="pip top-left"></span><span class="pip top-right"></span>
                <span class="pip center"></span>
                <span class="pip bottom-left"></span><span class="pip bottom-right"></span>
              </div>
            </div>
          </div>
          <div id="dice-result"></div>
          <button id="btn-roll" class="btn-dice hidden">Roll Dice</button>
        </div>
      </div>

      <!-- HUMAN PLAYER (bottom) -->
      <div id="player-bottom" class="player-zone human-zone" data-seat="0">
        <div id="player-name-label">You</div>
        <div id="player-chips-label">Chips: <span id="human-chips">25</span></div>
        <div id="human-hand" class="hand"></div>
        <div id="human-actions"></div>
      </div>

    </div>

    <!-- PHASE BANNER -->
    <div id="phase-banner">
      <span id="phase-text">Dealing cards...</span>
    </div>

    <!-- LOG -->
    <div id="game-log">
      <div id="log-inner"></div>
    </div>

  </div>

  <!-- ROUND RESULT MODAL -->
  <div id="modal-result" class="modal hidden">
    <div class="modal-box">
      <h2 id="result-title">Round Over</h2>
      <p id="result-body"></p>
      <div id="result-scores"></div>
      <button id="btn-next-round" class="btn-primary">Next Round</button>
      <button id="btn-end-game" class="btn-secondary">End Game</button>
    </div>
  </div>

  <!-- GAME OVER MODAL -->
  <div id="modal-gameover" class="modal hidden">
    <div class="modal-box">
      <h2 id="gameover-title">Game Over</h2>
      <p id="gameover-body"></p>
      <button id="btn-play-again" class="btn-primary">Play Again</button>
    </div>
  </div>

  <script src="js/deck.js"></script>
  <script src="js/dice.js"></script>
  <script src="js/chips.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/game.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
